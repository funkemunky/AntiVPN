on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
 
jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      JAVA_TOOL_OPTIONS: -Djavax.net.ssl.trustStoreType=JKS -Djavax.net.ssl.trustStore=/etc/ssl/certs/java/cacerts -Djavax.net.ssl.trustStorePassword=changeit

    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-cleanup: on-success
      - name: Build
        run: gradle build -x test --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload AntiVPN
        uses: actions/upload-artifact@v4
        with:
          name: AntiVPN-Universal
          path: build/libs/AntiVPN-*-universal.jar
