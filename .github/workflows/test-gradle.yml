on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'zulu'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 'wrapper'
      - name: Build
        run: ./gradlew build --no-daemon -Djavax.net.ssl.trustStoreType=JKS -Djavax.net.ssl.trustStore="$JAVA_HOME/lib/security/cacerts" -Djavax.net.ssl.trustStorePassword=changeit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
